services:
  # ── Ingesta manual (correr solo una vez) ─────────────────────────────────────
  # Uso: docker compose --profile ingest up ingest
  ingest:
    build: .
    volumes:
      - ./data:/app/data
    env_file: .env
    command: python mvp/ingest.py
    profiles:
      - ingest

  # ── App principal ─────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # Montar data/ para que ChromaDB persista entre reinicios
      - ./data:/app/data
    env_file: .env
    environment:
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
